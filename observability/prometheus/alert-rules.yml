groups:
  - name: sample-service-alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[1m]) > 0.05
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "The service is returning too many 5xx responses."

      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)) > 0.5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High p95 latency on {{ $labels.service }}"
          description: "p95 request latency is above 500ms."
